name: Deploy React app to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove bundled node_modules if present
        run: rm -rf WRWRLD-GALLERY/node_modules

      - name: Install dependencies
        working-directory: WRWRLD-GALLERY
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: |
          npm config set registry https://registry.npmjs.org/
          npm install

      - name: Build
        working-directory: WRWRLD-GALLERY
        run: npm run build

      - name: Prepare final Pages artifact
        run: |
          mkdir -p dist/WRWRLD-GALLERY
          cp -R WRWRLD-GALLERY/dist/* dist/WRWRLD-GALLERY/

          cat > dist/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=./WRWRLD-GALLERY/index.html" />
              <title>Redirecting...</title>
            </head>
            <body>
              <p>Redirecting to <a href="./WRWRLD-GALLERY/index.html">gallery</a>...</p>
            </body>
          </html>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
